# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - name: Cache npm dependencies
      uses: actions/cache@v5
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-${{ matrix.node-version }}-
    - run: npm ci
    - run: npm run lint
    - run: npm run build
    - run: npm test
    # Upload coverage from a single matrix leg for the SonarCloud job.
    # Coverage output is identical across Node versions (pure TypeScript,
    # no native addons), so one upload avoids redundant artifacts.
    - name: Upload coverage for SonarCloud
      if: matrix.node-version == '24.x'
      uses: actions/upload-artifact@v7
      with:
        name: lcov-report
        path: coverage/lcov.info
        retention-days: 1

  sonar:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v6
      with:
        # Shallow clones should be disabled for a better relevancy of analysis.
        # Ref: https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/ci-based-analysis/github-actions-for-sonarcloud/
        fetch-depth: 0
    - name: Download coverage artifact
      uses: actions/download-artifact@v8
      with:
        name: lcov-report
        path: coverage
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}